{{ define "main" }}
<section class="hero-v2" style="margin-bottom: 4rem; text-align: left;">
    <span class="status-pill" style="display: inline-block; padding: 4px 12px; background: var(--text-main); color: var(--bg-base); font-family: var(--font-mono); font-size: 0.65rem; font-weight: bold; margin-bottom: 1rem;">[ SYSTEM_STATUS: NOMINAL ]</span>
    <h1 style="font-family: var(--font-display); font-size: clamp(3rem, 10vw, 5rem); line-height: 0.85; text-transform: uppercase; letter-spacing: -0.04em;">Protocol 11-55: Mission Parameters</h1>
</section>

<article class="post-panel single-post" style="padding: 2rem;">
    <div class="post-content" style="font-size: 1.1rem; line-height: 1.7;">
        {{ .Content }}
    </div>
</article>
{{ end }}
