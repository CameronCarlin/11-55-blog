<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} // {{ .Site.Title }}{{ end }}</title>
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
    <script>
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
        }
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <div class="dot-matrix-bg"></div>
    <div class="dot-matrix-bulge"></div>
    <script>
        const updateFallback = () => {
            document.documentElement.style.setProperty('--mouse-x', (window.innerWidth / 2) + 'px');
            document.documentElement.style.setProperty('--mouse-y', (window.innerHeight / 2) + 'px');
        };
        updateFallback();
        window.addEventListener('resize', updateFallback);
        document.addEventListener('mousemove', (e) => {
            document.documentElement.style.setProperty('--mouse-x', e.clientX + 'px');
            document.documentElement.style.setProperty('--mouse-y', e.clientY + 'px');
        });
    </script>

    <header class="header-global">
        {{ partial "header.html" . }}
    </header>

    <main class="content-wrapper">
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}
    <script src="{{ "js/intel-filter.js" | relURL }}"></script>
</body>
</html>
